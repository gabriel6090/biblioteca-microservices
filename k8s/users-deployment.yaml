apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
      - name: user-service
        image: user-service:v1.1
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5001

        livenessProbe:
          httpGet:
            path: /health
            port: 5001

        readinessProbe:
          httpGet:
            path: /health
            port: 5001