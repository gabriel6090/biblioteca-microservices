apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway

spec:
  replicas: 2

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
      - name: api-gateway
        image: api-gateway:v1.1
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5000


        env:
        - name: USER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: USER_SERVICE_URL

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000